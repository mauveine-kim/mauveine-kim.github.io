<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunyu Kim — Director of Photography</title>
    <meta name="description" content="Sunyu Kim — Director of Photography based in London & Berlin. Cinematography, Camera, Editing, Direction.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #080808;
            --dark: #0e0e0e;
            --surface: #141414;
            --muted: #3a3a3a;
            --dim: #6b6b6b;
            --text: #a8a8a8;
            --light: #d4d4d4;
            --white: #f0ece6;
            --accent: #c9a96e;
            --accent-dim: #8a7245;
            --serif: 'Playfair Display', 'Georgia', serif;
            --mono: 'DM Mono', 'Courier New', monospace;
            --sans: 'Avenir', 'Avenir Next', 'Helvetica Neue', Arial, sans-serif;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
            background: var(--black);
        }

        body {
            font-family: var(--mono);
            font-weight: 300;
            color: var(--text);
            background: var(--black);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── Film Grain Overlay ── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
            background-size: 128px 128px;
        }

        /* ── Letterbox Bars ── */
        .letterbox-top,
        .letterbox-bottom {
            position: fixed;
            left: 0;
            right: 0;
            height: 3vh;
            background: #000;
            z-index: 100;
            pointer-events: none;
        }
        .letterbox-top { top: 0; }
        .letterbox-bottom { bottom: 0; }

        /* ── Viewfinder Corners ── */
        .viewfinder {
            position: fixed;
            z-index: 101;
            pointer-events: none;
            width: 28px;
            height: 28px;
        }
        .viewfinder::before {
            content: '';
            position: absolute;
            inset: 0;
            border-color: var(--muted);
            border-style: solid;
        }
        .viewfinder--tl { top: calc(3vh + 20px); left: 20px; }
        .viewfinder--tl::before { border-width: 1px 0 0 1px; }
        .viewfinder--tr { top: calc(3vh + 20px); right: 20px; }
        .viewfinder--tr::before { border-width: 1px 1px 0 0; }
        .viewfinder--bl { bottom: calc(3vh + 20px); left: 20px; }
        .viewfinder--bl::before { border-width: 0 0 1px 1px; }
        .viewfinder--br { bottom: calc(3vh + 20px); right: 20px; }
        .viewfinder--br::before { border-width: 0 1px 1px 0; }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: var(--black); }
        ::-webkit-scrollbar-thumb { background: var(--muted); }

        /* ── Layout ── */
        .page {
            position: relative;
            min-height: 100vh;
            padding: calc(3vh + 40px) 0;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 clamp(24px, 5vw, 80px);
        }

        /* ── Hero ── */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .hero__eyebrow {
            font-family: var(--mono);
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeUp 1s ease 0.3s forwards;
        }

        .hero__name {
            font-family: var(--serif);
            font-weight: 500;
            font-size: clamp(3.5rem, 10vw, 8rem);
            line-height: 0.95;
            color: var(--white);
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1.2s ease 0.5s forwards;
            white-space: nowrap;
        }

        .hero__name em {
            font-style: normal;
            font-weight: 500;
            color: var(--accent);
        }

        .hero__rule {
            width: 80px;
            height: 1px;
            background: var(--accent-dim);
            border: none;
            margin-bottom: 2rem;
            opacity: 0;
            transform: scaleX(0);
            transform-origin: left;
            animation: scaleIn 0.8s ease 0.9s forwards;
        }

        .hero__title {
            font-family: var(--serif);
            font-size: clamp(1.2rem, 2.5vw, 1.6rem);
            font-weight: 400;
            color: var(--light);
            letter-spacing: 0.04em;
            margin-bottom: 0.75rem;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeUp 1s ease 1.1s forwards;
        }

        .hero__subtitle {
            font-family: var(--mono);
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--dim);
            opacity: 0;
            transform: translateY(12px);
            animation: fadeUp 1s ease 1.3s forwards;
        }

        .hero__scroll-cue {
            position: absolute;
            bottom: clamp(40px, 6vh, 80px);
            left: clamp(24px, 5vw, 80px);
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            opacity: 0;
            animation: fadeIn 1s ease 2s forwards;
        }

        .hero__scroll-line {
            width: 32px;
            height: 1px;
            background: var(--muted);
            position: relative;
            overflow: hidden;
        }
        .hero__scroll-line::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--accent-dim);
            animation: slideLine 2.5s ease-in-out infinite;
        }

        /* ── Timecode (top-right) ── */
        .timecode {
            position: fixed;
            top: calc(3vh + 22px);
            right: 60px;
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            color: var(--muted);
            z-index: 50;
            opacity: 0;
            animation: fadeIn 1s ease 1.8s forwards;
        }

        /* ── Sections ── */
        .section {
            padding: clamp(60px, 12vh, 140px) 0;
        }

        .section__label {
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--surface);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .section__label-number {
            color: var(--accent-dim);
            font-size: 0.55rem;
        }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--surface);
        }

        .tab-btn {
            background: none;
            border: none;
            font-family: var(--mono);
            font-size: 0.68rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--dim);
            padding: 14px 24px;
            cursor: pointer;
            position: relative;
            transition: color 0.3s ease;
        }

        .tab-btn:hover {
            color: var(--light);
        }

        .tab-btn.is-active {
            color: var(--white);
        }

        .tab-btn.is-active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--accent);
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.is-active {
            display: block;
        }

        /* ── Video Project Cards ── */
        .project-list {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .project-card {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 2rem;
            background: var(--dark);
            border: 1px solid var(--surface);
            padding: 2px;
            transition: border-color 0.5s ease;
            text-decoration: none;
            color: inherit;
        }

        .project-card:hover {
            border-color: var(--muted);
        }

        @media (max-width: 768px) {
            .project-card {
                grid-template-columns: 1fr;
            }
        }

        .project-card__thumbnail {
            position: relative;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            background: var(--surface);
        }

        .project-card__thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s ease;
        }

        .project-card:hover .project-card__thumbnail img {
            transform: scale(1.03);
        }

        .project-card__play {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.3);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .project-card:hover .project-card__play {
            opacity: 1;
        }

        .project-card__play-icon {
            width: 48px;
            height: 48px;
            border: 1.5px solid rgba(255,255,255,0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .project-card__play-icon::after {
            content: '';
            display: block;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 8px 0 8px 14px;
            border-color: transparent transparent transparent rgba(255,255,255,0.9);
            margin-left: 3px;
        }

        .project-card__info {
            padding: clamp(20px, 3vw, 36px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
        }

        .project-card__category {
            font-family: var(--mono);
            font-size: 0.55rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--accent-dim);
        }

        .project-card__title {
            font-family: var(--serif);
            font-size: clamp(1.4rem, 2.5vw, 2rem);
            font-weight: 400;
            color: var(--white);
            line-height: 1.2;
            font-style: italic;
        }

        .project-card__position {
            font-family: var(--serif);
            font-size: clamp(1.4rem, 2.5vw, 2rem);
            font-weight: 600;
            line-height: 1.2;
            color: var(--text);
        }

        .project-card__credits {
            font-family: var(--serif);
            font-size: 0.95rem;
            color: var(--dim);
            font-weight: 300;
        }

        .project-card__award {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--mono);
            font-size: 0.58rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            margin-top: 4px;
        }

        .project-card__award::before {
            content: '';
            display: block;
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── Photo Grid ── */
        .photo-grid {
            columns: 3;
            column-gap: 8px;
        }

        @media (max-width: 768px) {
            .photo-grid { columns: 2; }
        }

        @media (max-width: 480px) {
            .photo-grid { columns: 1; }
        }

        .photo-grid__item {
            break-inside: avoid;
            margin-bottom: 8px;
            overflow: hidden;
            background: var(--surface);
            position: relative;
        }

        .photo-grid__item img {
            width: 100%;
            display: block;
            transition: transform 0.6s ease;
        }

        .photo-grid__item:hover img {
            transform: scale(1.03);
        }

        /* ── Contact (bottom, big & bright) ── */
        .contact-section {
            padding: clamp(80px, 16vh, 180px) 0 calc(3vh + 60px);
        }

        .contact-section .section__label {
            margin-bottom: 4rem;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px;
            margin-bottom: 3rem;
        }

        @media (max-width: 640px) {
            .contact-grid { grid-template-columns: 1fr; }
        }

        .contact-block {
            background: var(--dark);
            border: 1px solid var(--surface);
            padding: clamp(36px, 5vw, 64px);
            transition: border-color 0.5s ease;
        }

        .contact-block:hover {
            border-color: var(--muted);
        }

        .contact-block__label {
            font-family: var(--sans);
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 1.2rem;
        }

        .contact-block__value {
            font-family: var(--sans);
            font-size: clamp(1.3rem, 2.5vw, 1.8rem);
            font-weight: 400;
            color: var(--white);
            text-decoration: none;
            transition: color 0.3s ease;
            letter-spacing: 0.01em;
        }

        a.contact-block__value:hover {
            color: var(--accent);
        }

        /* ── Download CV (big & bright) ── */
        .cv-link {
            display: inline-flex;
            align-items: center;
            gap: 20px;
            padding: 24px 52px;
            border: 2px solid var(--accent);
            background: transparent;
            text-decoration: none;
            font-family: var(--sans);
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--white);
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .cv-link::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.5s ease;
            z-index: -1;
        }

        .cv-link:hover {
            color: var(--black);
            border-color: var(--accent);
        }

        .cv-link:hover::before {
            transform: scaleX(1);
        }

        .cv-link__arrow {
            width: 24px;
            height: 2px;
            background: currentColor;
            position: relative;
            transition: width 0.3s ease;
        }

        .cv-link__arrow::after {
            content: '';
            position: absolute;
            right: 0;
            top: -4px;
            width: 9px;
            height: 9px;
            border-right: 2px solid currentColor;
            border-bottom: 2px solid currentColor;
            transform: rotate(-45deg);
        }

        .cv-link:hover .cv-link__arrow {
            width: 32px;
        }

        /* ── Footer ── */
        .footer {
            padding: 3rem 0 calc(3vh + 40px);
            border-top: 1px solid var(--surface);
        }

        .footer__inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .footer__mark {
            font-family: var(--serif);
            font-size: 0.9rem;
            color: var(--muted);
            font-style: italic;
        }

        .footer__legal {
            font-family: var(--mono);
            font-size: 0.55rem;
            letter-spacing: 0.15em;
            color: var(--muted);
        }

        /* ── Reveal Animations ── */
        .reveal {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .reveal.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal-delay-1 { transition-delay: 0.1s; }
        .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.3s; }
        .reveal-delay-4 { transition-delay: 0.4s; }

        /* ── Keyframes ── */
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        @keyframes scaleIn {
            to { opacity: 1; transform: scaleX(1); }
        }
        @keyframes slideLine {
            0% { left: -100%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .viewfinder { display: none; }
            .timecode { display: none; }
            .hero__name { letter-spacing: -0.01em; }
            .tabs { overflow-x: auto; }
            .tab-btn { padding: 12px 16px; font-size: 0.6rem; white-space: nowrap; }
        }
    </style>
</head>
<body>

    <!-- Letterbox Bars -->
    <div class="letterbox-top"></div>
    <div class="letterbox-bottom"></div>

    <!-- Viewfinder Corners -->
    <div class="viewfinder viewfinder--tl"></div>
    <div class="viewfinder viewfinder--tr"></div>
    <div class="viewfinder viewfinder--bl"></div>
    <div class="viewfinder viewfinder--br"></div>

    <!-- Timecode -->
    <div class="timecode" id="timecode">00:00:00:00</div>

    <div class="page">
        <div class="container">

            <!-- Hero -->
            <section class="hero">
                <div>
                    <p class="hero__eyebrow">London &amp; Berlin</p>
                    <h1 class="hero__name">Sunyu <em>Kim</em></h1>
                    <hr class="hero__rule">
                    <p class="hero__title">Director of Photography</p>
                    <p class="hero__subtitle">Assistant Camera &nbsp;/&nbsp; Editor &nbsp;/&nbsp; Assistant Director</p>
                </div>
                <div class="hero__scroll-cue">
                    <span class="hero__scroll-line"></span>
                    Scroll
                </div>
            </section>

            <!-- Projects -->
            <section class="section" id="projects">
                <div class="section__label reveal">
                    <span class="section__label-number">01</span>
                    Projects
                </div>

                <div class="tabs reveal reveal-delay-1">
                    <button class="tab-btn is-active" data-tab="dop">Director of Photography</button>
                    <button class="tab-btn" data-tab="editing">Editing</button>
                    <button class="tab-btn" data-tab="photo">Still Photography</button>
                </div>

                <!-- Tab: Director of Photography (loaded from data/dop.js) -->
                <div class="tab-panel is-active" id="tab-dop">
                    <div class="project-list" id="list-dop"></div>
                </div>

                <!-- Tab: Editing (loaded from data/editing.js) -->
                <div class="tab-panel" id="tab-editing">
                    <div class="project-list" id="list-editing"></div>
                </div>

                <!-- Tab: Still Photography (loaded from data/photos.js) -->
                <div class="tab-panel" id="tab-photo">
                    <div class="photo-grid" id="photo-grid"></div>
                </div>

            </section>

            <!-- Contact -->
            <section class="contact-section" id="contact">
                <div class="section__label reveal">
                    <span class="section__label-number">02</span>
                    Contact
                </div>
                <div class="contact-grid reveal reveal-delay-1">
                    <div class="contact-block">
                        <div class="contact-block__label">Telephone</div>
                        <a href="tel:+447768902378" class="contact-block__value">+44 7768 902378</a>
                    </div>
                    <div class="contact-block">
                        <div class="contact-block__label">Email</div>
                        <a href="mailto:photo@sunyu.kim" class="contact-block__value">photo@sunyu.kim</a>
                    </div>
                </div>
                <div class="reveal reveal-delay-2">
                    <a href="./sunyu-kim-cv.pdf" class="cv-link" download>
                        Download CV
                        <span class="cv-link__arrow"></span>
                    </a>
                </div>
            </section>

            <!-- Footer -->
            <footer class="footer">
                <div class="footer__inner reveal">
                    <span class="footer__mark">S. Kim</span>
                    <span class="footer__legal">&copy; 2026 Sunyu Kim. All rights reserved.</span>
                </div>
            </footer>

        </div>
    </div>

    <!-- Data files (edit these to manage content) -->
    <script src="./data/dop.js"></script>
    <script src="./data/editing.js"></script>
    <script src="./data/photos.js"></script>

    <script>
        /* ── Scroll Reveal ── */
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                }
            });
        }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        /* ── Helpers ── */
        function getYouTubeId(url) {
            const match = url.match(/(?:v=|\/embed\/|youtu\.be\/|\/v\/|\/shorts\/)([a-zA-Z0-9_-]{11})/);
            return match ? match[1] : null;
        }

        function esc(str) { return (str || '').replace(/</g, '&lt;').replace(/"/g, '&quot;'); }

        function buildProjectCard(project) {
            const videoId = getYouTubeId(project.youtube || '');
            const thumb = videoId ? 'https://img.youtube.com/vi/' + videoId + '/maxresdefault.jpg' : '';
            const youtubeUrl = videoId ? 'https://www.youtube.com/watch?v=' + videoId : '#';

            const awardHtml = project.award
                ? '<span class="project-card__award">' + esc(project.award) + '</span>'
                : '';

            const card = document.createElement('a');
            card.href = youtubeUrl;
            card.target = '_blank';
            card.rel = 'noopener noreferrer';
            card.className = 'project-card reveal';
            card.innerHTML =
                '<div class="project-card__thumbnail">' +
                    '<img src="' + thumb + '" alt="' + esc(project.title) + '" loading="lazy">' +
                    '<div class="project-card__play"><div class="project-card__play-icon"></div></div>' +
                '</div>' +
                '<div class="project-card__info">' +
                    '<span class="project-card__category">' + esc(project.category) + '</span>' +
                    '<h3 class="project-card__title">' + esc(project.title) + '</h3>' +
                    '<span class="project-card__position">' + esc(project.position) + '</span>' +
                    '<span class="project-card__credits">' + esc(project.credits) + '</span>' +
                    awardHtml +
                '</div>';
            return card;
        }

        function renderProjects(containerId, projects) {
            const container = document.getElementById(containerId);
            projects.forEach(p => {
                const card = buildProjectCard(p);
                container.appendChild(card);
                observer.observe(card);
            });
        }

        /* ── Render from data files ── */
        renderProjects('list-dop', defined_dop_projects);
        renderProjects('list-editing', defined_editing_projects);

        /* ── Load Photos (001.jpg ~ {photo_count}.jpg) ── */
        (function() {
            const grid = document.getElementById('photo-grid');
            for (var i = 1; i <= photo_count; i++) {
                var filename = String(i).padStart(3, '0') + '.jpg';
                var item = document.createElement('div');
                item.className = 'photo-grid__item reveal';
                item.innerHTML = '<img src="./assets/photos/' + filename + '" alt="Photograph" loading="lazy">';
                grid.appendChild(item);
                observer.observe(item);
            }
        })();

        /* ── Tabs ── */
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabPanels = document.querySelectorAll('.tab-panel');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const target = btn.dataset.tab;

                tabBtns.forEach(b => b.classList.remove('is-active'));
                tabPanels.forEach(p => p.classList.remove('is-active'));

                btn.classList.add('is-active');
                document.getElementById('tab-' + target).classList.add('is-active');

                /* Re-observe reveals inside newly active panel */
                const newReveals = document.getElementById('tab-' + target).querySelectorAll('.reveal:not(.is-visible)');
                newReveals.forEach(el => observer.observe(el));
            });
        });

        /* ── Timecode ── */
        const timecodeEl = document.getElementById('timecode');
        const startTime = Date.now();
        function updateTimecode() {
            const elapsed = Date.now() - startTime;
            const totalFrames = Math.floor(elapsed / (1000 / 24));
            const frames = totalFrames % 24;
            const totalSeconds = Math.floor(totalFrames / 24);
            const seconds = totalSeconds % 60;
            const totalMinutes = Math.floor(totalSeconds / 60);
            const minutes = totalMinutes % 60;
            const hours = Math.floor(totalMinutes / 60);

            timecodeEl.textContent =
                String(hours).padStart(2, '0') + ':' +
                String(minutes).padStart(2, '0') + ':' +
                String(seconds).padStart(2, '0') + ':' +
                String(frames).padStart(2, '0');

            requestAnimationFrame(updateTimecode);
        }
        requestAnimationFrame(updateTimecode);
    </script>

</body>
</html>
